<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Генплан Алматы — студия (пробивка / трассировка)</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@2.18.3/dist/leaflet-geoman.min.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/@turf/turf@7/turf.min.js"></script>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  #map { width: 100%; height: 100%; background: #0b0d10; }
  .ctl { background: rgba(20,22,26,.93); color: #eee; padding: 10px 12px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.45); font-size: 13px; min-width: 220px; }
  .ctl b { color: #ffd23f; }
  .ctl .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .ctl input[type=range] { flex: 1; }
  .ctl .val { font-family: monospace; width: 40px; text-align: right; color: #9be29b; }
  .ctl button { background: #2d7ef7; color: #fff; border: 0; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 8px; width: 100%; }
  .ctl .hint { color: #9aa0a6; font-size: 11px; margin-top: 8px; line-height: 1.35; }
  .measure-tip { background: #111; color: #ffd23f; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; font-family: monospace; font-size: 12px; white-space: nowrap; }
  #sum { margin-top: 8px; font-family: monospace; font-size: 12px; color: #9be29b; white-space: pre-line; }
</style>
</head>
<body>
<div id="map"></div>
<script>
const OVERLAY_BOUNDS = [[43.02597, 76.64368], [43.46200, 77.20444]];
const MAX_NATIVE = 16;

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", { maxZoom: 20, attribution: "© OpenStreetMap" });
const sat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", { maxZoom: 20, attribution: "Esri" });
const satLbl = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}", { maxZoom: 20 });
const genplan = L.tileLayer("tiles/{z}/{x}/{y}.png", { maxZoom: 20, maxNativeZoom: MAX_NATIVE, bounds: OVERLAY_BOUNDS, opacity: 0.45, attribution: "Генплан Алматы" });

const map = L.map("map", { center: [43.238, 76.92], zoom: 13, layers: [osm, genplan] });

L.control.layers(
  { "OSM (улицы)": osm, "Спутник Esri": sat },
  { "Подписи (спутник)": satLbl, "Генплан (оверлей)": genplan },
  { collapsed: false, position: "topright" }
).addTo(map);

// --- Geocoder (Nominatim), смещён на Алматы ---
L.Control.geocoder({
  defaultMarkGeocode: true,
  placeholder: "Поиск: напр. «Сатпаева»",
  geocoder: L.Control.Geocoder.nominatim({
    geocodingQueryParams: { viewbox: "76.7,43.42,77.15,43.12", bounded: 1, countrycodes: "kz" }
  })
}).addTo(map);

// --- Geoman: рисование трасс/полигонов ---
map.pm.addControls({
  position: "topleft",
  drawMarker: true, drawCircleMarker: false, drawPolyline: true, drawRectangle: false,
  drawPolygon: true, drawCircle: false, drawText: true, editMode: true, dragMode: true,
  cutPolygon: false, removalMode: true, rotateMode: false
});
map.pm.setGlobalOptions({ continueDrawing: false });

function fmtLen(m) { return m >= 1000 ? (m / 1000).toFixed(2) + " км" : Math.round(m) + " м"; }
function fmtArea(m2) { return m2 >= 10000 ? (m2 / 10000).toFixed(2) + " га" : Math.round(m2) + " м²"; }

function measure(layer) {
  const gj = layer.toGeoJSON();
  const t = gj.geometry.type;
  if (t === "LineString") {
    const km = turf.length(gj, { units: "kilometers" });
    layer.bindTooltip("Трасса: " + fmtLen(km * 1000), { permanent: true, direction: "center", className: "measure-tip" }).openTooltip();
  } else if (t === "Polygon") {
    const a = turf.area(gj);
    const per = turf.length(turf.polygonToLine(gj), { units: "kilometers" }) * 1000;
    layer.bindTooltip("Footprint: " + fmtArea(a) + " · периметр " + fmtLen(per), { permanent: true, direction: "center", className: "measure-tip" }).openTooltip();
  }
  updateSummary();
}

function updateSummary() {
  let totLen = 0, totArea = 0, nL = 0, nA = 0;
  map.pm.getGeomanLayers().forEach(l => {
    const g = l.toGeoJSON && l.toGeoJSON();
    if (!g || !g.geometry) return;
    if (g.geometry.type === "LineString") { totLen += turf.length(g, { units: "kilometers" }) * 1000; nL++; }
    if (g.geometry.type === "Polygon") { totArea += turf.area(g); nA++; }
  });
  const el = document.getElementById("sum");
  if (el) el.textContent = `Трасс: ${nL} (Σ ${fmtLen(totLen)})\nПолигонов: ${nA} (Σ ${fmtArea(totArea)})`;
}

map.on("pm:create", e => { measure(e.layer); e.layer.on("pm:edit", () => measure(e.layer)); });
map.on("pm:remove", updateSummary);

// --- Панель: прозрачность + экспорт ---
const Panel = L.Control.extend({
  options: { position: "bottomleft" },
  onAdd: function () {
    const d = L.DomUtil.create("div", "ctl");
    d.innerHTML = `
      <b>Студия трассировки</b>
      <div class="row"><span>Генплан</span>
        <input id="op" type="range" min="0" max="100" value="45"><span class="val" id="opv">45%</span></div>
      <button id="exp">Экспорт GeoJSON</button>
      <div id="sum"></div>
      <div class="hint">Слева: ✏️ линия = трасса (длина), ▱ полигон = footprint сноса (га), 🖉 правка, 🗑 удалить. Поиск адреса — справа сверху.</div>`;
    L.DomEvent.disableClickPropagation(d);
    L.DomEvent.disableScrollPropagation(d);
    return d;
  }
});
map.addControl(new Panel());

document.getElementById("op").addEventListener("input", e => {
  genplan.setOpacity(+e.target.value / 100);
  document.getElementById("opv").textContent = e.target.value + "%";
});
document.getElementById("exp").addEventListener("click", () => {
  const fc = { type: "FeatureCollection", features: [] };
  map.pm.getGeomanLayers().forEach(l => { if (l.toGeoJSON) fc.features.push(l.toGeoJSON()); });
  const blob = new Blob([JSON.stringify(fc, null, 2)], { type: "application/json" });
  const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "trace.geojson"; a.click();
});

L.control.scale({ imperial: false }).addTo(map);
</script>
</body>
</html>
