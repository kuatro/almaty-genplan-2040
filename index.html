<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Генплан Алматы поверх карты</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.css" />
<link rel="stylesheet" href="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-control-geocoder@2.4.0/dist/Control.Geocoder.js"></script>
<script src="https://unpkg.com/leaflet.locatecontrol@0.79.0/dist/L.Control.Locate.min.js"></script>
<script data-goatcounter="https://kuatro.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
<style>
  html, body { margin: 0; height: 100%; font-family: -apple-system, Segoe UI, Roboto, sans-serif; }
  #map { width: 100%; height: 100%; background: #0b0d10; }
  .ctl { background: rgba(20,22,26,.92); color: #eee; padding: 10px 12px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.4); font-size: 13px; min-width: 200px; }
  .ctl b { color: #ffd23f; }
  .ctl .row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }
  .ctl input[type=range] { flex: 1; }
  .ctl label { display: flex; align-items: center; gap: 6px; cursor: pointer; margin-top: 6px; }
  .ctl .val { font-family: monospace; width: 38px; text-align: right; color: #9be29b; }
  .ctl button { background: #2d7ef7; color: #fff; border: 0; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; margin-top: 8px; width: 100%; }

  /* legend */
  .legend { background: rgba(20,22,26,.92); color: #eee; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,.4); font-size: 12px; max-width: 260px; }
  .legend .legend-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 8px 12px; cursor: pointer; user-select: none; }
  .legend .legend-head b { color: #ffd23f; }
  .legend .legend-head .chev { transition: transform .15s; color: #9be29b; }
  .legend.collapsed .legend-head .chev { transform: rotate(-90deg); }
  .legend .legend-body { padding: 0 12px 10px; max-height: 60vh; overflow-y: auto; }
  .legend.collapsed .legend-body { display: none; }
  .legend .legend-group { margin-top: 8px; font-size: 10.5px; letter-spacing: .4px; color: #8a8f98; text-transform: uppercase; }
  .legend .legend-item { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  .legend .sw { flex: 0 0 22px; height: 13px; border-radius: 2px; border: 1px solid rgba(255,255,255,.15); }
  .legend .sw.outline { background: transparent; border: 2px solid #ed1c24; }
  .legend .sw.hatch { background-image: repeating-linear-gradient(45deg, #bbb 0 2px, transparent 2px 5px); background-color: #2b2e33; }
  .legend .sw.line { height: 0; border: 0; border-top: 3px solid #9e9e9e; border-radius: 0; }
  .legend .sw.line.dashed { border-top: 3px dashed #d33; }
  .legend .sw.line.water { border-top: 3px solid #1f7ae8; }
</style>
</head>
<body>
<div id="map"></div>
<script>
const OVERLAY_BOUNDS = [[43.02597, 76.64368], [43.46200, 77.20444]]; // [[S,W],[N,E]]
const MAX_NATIVE = 16;

const osm = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
  maxZoom: 20, attribution: "© OpenStreetMap"
});
const sat = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
  maxZoom: 20, attribution: "Esri World Imagery"
});
const satLbl = L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}", { maxZoom: 20 });

const genplan = L.tileLayer("tiles/{z}/{x}/{y}.png", {
  minZoom: 0, maxZoom: 20, maxNativeZoom: MAX_NATIVE,
  bounds: OVERLAY_BOUNDS, opacity: 0.35, tms: false,
  attribution: "Генплан Алматы"
});

const map = L.map("map", { center: [43.238, 76.945], zoom: 12, layers: [osm, genplan] });
map.fitBounds(OVERLAY_BOUNDS);

// Переключатель подложек (выбор карты) пока скрыт — оставлен в коде на будущее.
// L.control.layers(
//   { "OSM (улицы)": osm, "Спутник Esri": sat },
//   { "Подписи (спутник)": satLbl, "Генплан (оверлей)": genplan },
//   { collapsed: false, position: "topright" }
// ).addTo(map);

// Поиск по адресам/местам (Nominatim, без ключа), с приоритетом по границам генплана.
L.Control.geocoder({
  position: "topright",
  placeholder: "Поиск адреса или места…",
  defaultMarkGeocode: true,
  geocoder: L.Control.Geocoder.nominatim({
    geocodingQueryParams: {
      viewbox: [OVERLAY_BOUNDS[0][1], OVERLAY_BOUNDS[0][0], OVERLAY_BOUNDS[1][1], OVERLAY_BOUNDS[1][0]].join(","),
      bounded: 0,
      countrycodes: "kz",
    },
  }),
}).addTo(map);

// opacity control
const OpacityCtl = L.Control.extend({
  options: { position: "topleft" },
  onAdd: function () {
    const d = L.DomUtil.create("div", "ctl");
    d.innerHTML = `
      <b>Генплан Алматы</b>
      <div class="row">
        <span>Прозрачность</span>
        <input id="op" type="range" min="0" max="100" value="35">
        <span class="val" id="opv">35%</span>
      </div>
      <button id="fit">К границам генплана</button>`;
    L.DomEvent.disableClickPropagation(d);
    L.DomEvent.disableScrollPropagation(d);
    return d;
  }
});
map.addControl(new OpacityCtl());

document.getElementById("op").addEventListener("input", e => {
  const v = +e.target.value;
  genplan.setOpacity(v / 100);
  document.getElementById("opv").textContent = v + "%";
});
document.getElementById("fit").addEventListener("click", () => map.fitBounds(OVERLAY_BOUNDS));

// Геолокация: «найти себя» на карте.
L.control.locate({
  position: "topleft",
  flyTo: true,
  keepCurrentZoomLevel: true,
  showPopup: false,
  drawCircle: true,
  strings: {
    title: "Показать моё местоположение",
    popup: "Вы находитесь в пределах {distance} {unit} от этой точки",
  },
  locateOptions: { enableHighAccuracy: true, maxZoom: 16 },
}).addTo(map);

L.control.scale({ imperial: false }).addTo(map);

// legend
const LEGEND = [
  { group: "Жилые зоны", items: [
    { c: "#fff27f", t: "Усадебная застройка (1–3 эт.)" },
    { c: "#f4a98f", t: "Малоэтажная застройка (2–3 эт.)" },
    { c: "#f5a623", t: "Среднеэтажная застройка (4–5 эт.)" },
    { c: "#ec5fa0", t: "Многоэтажная застройка (6–12 эт.)" },
    { c: "#b3122b", t: "Высотная застройка (12+ эт.)" },
  ]},
  { group: "Общественно-деловые зоны", items: [
    { c: "#ed1c24", t: "Общественно-деловая застройка" },
    { c: "#9b8fd6", t: "Многофункциональные центры" },
  ]},
  { group: "Производственные зоны", items: [
    { c: "#8f86d6", t: "Промышленные зоны" },
    { c: "#8fc7e8", t: "Коммунально-складские зоны" },
  ]},
  { group: "Рекреационные и природные зоны", items: [
    { c: "#7ac143", t: "Парки, скверы, бульвары" },
    { c: "#1f7a1f", t: "Леса, горные территории" },
    { c: "#1f7ae8", t: "Озёра, водохранилища, реки" },
  ]},
  { group: "Специальные зоны", items: [
    { c: "#9e9e9e", t: "Инженерная инфраструктура" },
    { c: "#8b5a2b", t: "Транспортные узлы" },
    { cls: "hatch", t: "Зоны перспективного развития" },
  ]},
  { group: "Границы и линии", items: [
    { cls: "outline", t: "Граница города" },
    { cls: "line", t: "Основные магистрали" },
    { cls: "line dashed", t: "Железные дороги" },
    { cls: "line water", t: "Реки и каналы" },
  ]},
];

const Legend = L.Control.extend({
  options: { position: "bottomright" },
  onAdd: function () {
    const d = L.DomUtil.create("div", "legend collapsed");
    let body = "";
    for (const g of LEGEND) {
      body += `<div class="legend-group">${g.group}</div>`;
      for (const it of g.items) {
        const sw = it.cls
          ? `<span class="sw ${it.cls}"></span>`
          : `<span class="sw" style="background:${it.c}"></span>`;
        body += `<div class="legend-item">${sw}<span>${it.t}</span></div>`;
      }
    }
    d.innerHTML = `
      <div class="legend-head"><b>Условные обозначения</b><span class="chev">▾</span></div>
      <div class="legend-body">${body}</div>`;
    L.DomEvent.disableClickPropagation(d);
    L.DomEvent.disableScrollPropagation(d);
    d.querySelector(".legend-head").addEventListener("click", () => d.classList.toggle("collapsed"));
    return d;
  }
});
map.addControl(new Legend());
</script>
</body>
</html>
